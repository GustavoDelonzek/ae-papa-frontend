<div class="appointments-type-container">
  <div class="header-content">
    <h3>Atendimentos por tipo</h3>
    <p>Distribuição dos serviços através das categorias clínicas.</p>
  </div>

  <div class="type-list" *ngIf="items.length > 0; else emptyState">
    <div class="type-item" *ngFor="let item of items; let i = index">
      <div class="type-info">
        <span class="type-name">{{ getAppointmentObjectiveLabel(item.objective) }}</span>
        <span class="type-percent">{{ getAppointmentTypePercentage(item.total) }}%</span>
      </div>
      <div class="type-progress-track">
        <div 
          class="type-progress-fill" 
          [class.primary]="i === 0"
          [class.secondary]="i === 1"
          [class.tertiary]="i === 2"
          [class.quaternary]="i >= 3"
          [style.width.%]="getAppointmentTypePercentage(item.total)">
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      Sem dados para o período
    </div>
  </ng-template>

  <!-- Demostration of the user's efficiency score from the mock image -->
  <div class="efficiency-score" *ngIf="score > 0">
    <div class="score-icon">
      <i class="fa-solid fa-gauge-high"></i>
    </div>
    <div class="score-data">
      <span class="score-label">EFFICIENCY SCORE</span>
      <span class="score-value">{{ score }}/100</span>
    </div>
  </div>
</div>

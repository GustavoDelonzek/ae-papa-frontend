<div class="login-container">
  <div class="login-left">
    <div class="login-overlay"></div>
    <img src="assets/images/imagem-fundo-login.jpg" alt="Background" class="login-bg-image">
  </div>

  <div class="login-right">
    <div class="login-form-container">
      <div class="logo-container">
        <img src="assets/images/logo.png" alt="Logo AEPAPA" class="logo-image">
      </div>

      <div class="login-header">
        <h1 class="login-title">Bem-vindo de volta</h1>
        <p class="login-subtitle">Entre com suas credenciais para acessar o sistema</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" name="email" class="form-control" [(ngModel)]="loginData.email" required
              email #email="ngModel" placeholder="seu@email.com" autocomplete="email">
          </div>
          <div *ngIf="email.invalid && email.touched" class="field-error">
            <small *ngIf="email.errors?.['required']">Email é obrigatório</small>
            <small *ngIf="email.errors?.['email']">Email inválido</small>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" class="form-control"
              [(ngModel)]="loginData.password" required #password="ngModel" placeholder="••••••••"
              autocomplete="current-password">
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
              aria-label="Toggle password visibility">
              <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
          <div *ngIf="password.invalid && password.touched" class="field-error">
            <small *ngIf="password.errors?.['required']">Senha é obrigatória</small>
          </div>
        </div>

        <button type="submit" class="btn-entrar" [disabled]="!loginForm.form.valid || isLoading">
          <span *ngIf="isLoading" class="btn-loading">
            <i class="fas fa-spinner fa-spin"></i>
            Entrando...
          </span>
          <span *ngIf="!isLoading">
            <i class="fas fa-sign-in-alt btn-icon"></i>
            Entrar
          </span>
        </button>
      </form>
    </div>
  </div>
</div>

<div class="modal-backdrop" (click)="close()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <div class="header-title">
        <i class="fas fa-cloud-upload-alt header-icon"></i>
        <h2>Upload de Documento</h2>
      </div>
      <button class="btn-close" (click)="close()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body-wrapper">
      <!-- Left Column: Upload Area -->
      <div class="upload-column">
        <div class="drop-zone" [class.drag-over]="dragOver" [class.has-file]="selectedFile"
          (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">

          <div class="drop-zone-content" *ngIf="!selectedFile">
            <div class="icon-circle">
              <i class="fas fa-file-alt"></i>
            </div>
            <p class="drop-text">Arraste e solte o arquivo aqui</p>
            <p class="drop-subtext">ou clique para selecionar</p>

            <button class="btn-select-file" type="button" (click)="fileInput.click()">
              Selecionar Arquivo
            </button>

            <p class="file-requirements">Formatos suportados: PDF, JPG, JPEG ou PNG (máx. 5MB)</p>
          </div>

          <div class="selected-file-preview" *ngIf="selectedFile">
            <div class="file-preview-card">
              <i class="fas file-icon" [ngClass]="getFileIcon()"></i>
              <div class="file-details">
                <span class="file-name">{{ selectedFile.name }}</span>
                <span class="file-size">{{ getFileSize() }}</span>
              </div>
              <button class="btn-remove-file" type="button" (click)="removeFile(); $event.stopPropagation()">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <button class="btn-change-file" type="button" (click)="fileInput.click()">
              Trocar arquivo
            </button>
          </div>

          <input #fileInput type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onFileSelected($event)"
            style="display: none;">
        </div>

        <!-- Error message moved nicely below dropzone or inside if needed, but let's keep it visible -->
        <div class="error-feedback" *ngIf="errorMessage">
          <i class="fas fa-exclamation-circle"></i>
          {{ errorMessage }}
        </div>
      </div>

      <!-- Right Column: Metadata Form -->
      <div class="metadata-column">
        <div class="form-group">
          <label for="fileName">Nome do Documento <span class="required">*</span></label>
          <input id="fileName" type="text" [(ngModel)]="fileName" placeholder="Ex: Exame de sangue - Janeiro 2026"
            [disabled]="uploading" required>
        </div>

        <div class="form-group">
          <label for="documentType">Tipo de Documento</label>
          <div class="select-wrapper">
            <select id="documentType" [(ngModel)]="documentType" [disabled]="uploading">
              <option value="" disabled selected>Selecione um tipo...</option>
              <option value="exam">Exame</option>
              <option value="medical_report">Laudo</option>
              <option value="prescription">Receita</option>
              <option value="report">Relatório</option>
              <option value="referral">Referenciamento</option>
              <option value="others">Outros</option>
            </select>
            <i class="fas fa-chevron-down select-icon"></i>
          </div>
          <p class="help-text">Classificar corretamente ajuda na organização.</p>
        </div>

        <div class="form-group">
          <label for="description">Descrição</label>
          <textarea id="description" [(ngModel)]="description"
            placeholder="Adicione uma descrição ou observação detalhada sobre o documento..." rows="4"
            [disabled]="uploading"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close()" [disabled]="uploading">
        Cancelar
      </button>
      <button class="btn-confirm" (click)="uploadDocument()"
        [disabled]="!selectedFile || !fileName.trim() || uploading">
        <i class="fas" [ngClass]="uploading ? 'fa-spinner fa-spin' : 'fa-cloud-upload-alt'"></i>
        {{ uploading ? 'Enviando...' : 'Confirmar Upload' }}
      </button>
    </div>
  </div>
</div>
